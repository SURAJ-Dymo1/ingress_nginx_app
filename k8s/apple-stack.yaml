# 1. THE DEPLOYMENT (The App)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apple-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apple
  template:
    metadata:
      labels:
        app: apple
    spec:
      containers:
      - name: apple-container
        image: surajmane121045/ingress_app_one:bcb7002d6ebb6856b15b77502223b92b8b368cee
        ports:
        - containerPort: 80

---
# 2. THE SERVICE (The Internal Network Name)
apiVersion: v1
kind: Service
metadata:
  name: apple-service
spec:
  selector:
    app: apple # This MUST match the label in the Deployment
  ports:
    - protocol: TCP
      port: 80         # Port the Service listens on
      targetPort: 80 # Port the Pod is listening on