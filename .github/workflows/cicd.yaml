name: Three Tier CI/CD Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ---------------- FRONTEND ----------------
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/insurance-frontend:${IMAGE_TAG} ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/insurance-frontend:${IMAGE_TAG}

    # ---------------- BACKEND ----------------
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/insurance-backend:${IMAGE_TAG} ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/insurance-backend:${IMAGE_TAG}

    # ---------------- DATABASE ----------------
    # - name: Build Database Image
    #   run: |
    #     docker build -t ${{ secrets.DOCKER_USERNAME }}/three_tier_app_mongodb:${IMAGE_TAG} ./database
    #     docker push ${{ secrets.DOCKER_USERNAME }}/three_tier_app_mongodb:${IMAGE_TAG}

    # ---------------- UPDATE K8S MANIFESTS ----------------
    - name: Update Kubernetes Manifests
      run: |
        sed -i "s|image: .*insurance-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/insurance-backend:${IMAGE_TAG}|g" k8s-manifests/backend.yaml
        sed -i "s|image: .*insurance-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/insurance-frontend:${IMAGE_TAG}|g" k8s-manifests/frontend.yaml
# sed -i "s|image: .*three_tier_app_mongodb:.*|image: ${{ secrets.DOCKER_USERNAME }}/three_tier_app_mongodb:${IMAGE_TAG}|g" k8s-manifests/mongo-deployment.yaml

    - name: Commit Updated Manifests
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add k8s-manifests/
        git commit -m "Update image tags to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
        git push